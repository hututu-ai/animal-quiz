<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>挫折动物画像 · AI自测</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:#f5f5f0;min-height:100vh}
.fade{animation:f .5s cubic-bezier(.23,1,.32,1)}
@keyframes f{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.ob{transition:all .15s;cursor:pointer}
.ob:active{transform:scale(.97)}
.ob.s{background:#2c2c2c!important;color:#fff!important;border-color:#2c2c2c!important}
.pb{transition:width .4s ease}

/* 结果卡片 — 杂志风 */
.card{
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 2px 40px rgba(0,0,0,.06);
  position:relative;
}
.card-img-wrap{
  width:100%;
  aspect-ratio:4/3;
  overflow:hidden;
  position:relative;
}
.card-img-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.card-img-wrap::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:40%;
  background:linear-gradient(to top,rgba(255,255,255,1) 0%,rgba(255,255,255,0) 100%);
}
.card-body{
  padding:0 28px 32px;
  position:relative;
  margin-top:-20px;
}
.card-name{
  font-family:'Noto Serif SC',serif;
  font-size:32px;
  font-weight:900;
  color:#1a1a1a;
  letter-spacing:2px;
  margin-bottom:4px;
}
.card-sub{
  font-size:13px;
  color:#999;
  letter-spacing:1px;
  margin-bottom:20px;
}
.card-desc{
  font-size:14px;
  line-height:1.9;
  color:#555;
  margin-bottom:20px;
}
.card-tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:24px;
}
.card-tags span{
  font-size:12px;
  padding:5px 12px;
  border-radius:20px;
  background:#f5f5f0;
  color:#666;
  letter-spacing:0.5px;
}
.card-advice{
  border-top:1px solid #eee;
  padding-top:20px;
}
.card-advice h4{
  font-size:12px;
  color:#bbb;
  letter-spacing:2px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.card-advice p{
  font-size:13px;
  line-height:1.8;
  color:#777;
}
.card-footer{
  text-align:center;
  padding:16px 0 4px;
  font-size:11px;
  color:#ccc;
  letter-spacing:1px;
}
</style>
</head>
<body>
<div id="a" class="max-w-md mx-auto px-4 py-6 min-h-screen flex flex-col"></div>
<script>
var Q=[
['面对复杂问题时，你认为结果主要取决于：','自己的方法和努力','努力、方法和外部条件的综合','更多看运气或他人态度','无论如何努力，结果都差不多'],
['当事情发展不如预期，你的归因倾向是：','具体操作或时机问题，可以调整','多方面因素，需要综合分析','自己能力不够或准备不足','外界环境限制，个人无力改变'],
['对于改变现状的可能性，你的信念是：','完全有可能','较有可能','不太可能','完全不可能'],
['你经历挫折后的情绪恢复过程通常是：','短暂低落，很快找到新方向','需要一些时间，但能逐渐平复','持续焦虑，越想越乱','转为麻木，不再有情绪波动'],
['压力情境中，你对自己情绪的察觉度：','清晰知道情绪状态和触发原因','大致了解，但细节模糊','情绪混乱，难以理清','回避感受，不愿深入体验'],
['当感到无助时，你最先出现的念头是：','"我需要找到新的解决方法"','"也许需要休息一下再试试"','"怎么办，越想越着急"','"算了，就这样吧"'],
['面对重复出现的问题，你的应对模式：','分析根本原因，寻求彻底解决','尝试不同方法，寻找最佳方案','用同样方法反复尝试，期待转机','避免面对，减少相关情境'],
['需要他人帮助时，你的态度是：','主动寻找合适的帮助资源','会求助，但更倾向自己解决','想求助但担心被拒绝或评价','宁愿自己硬扛也不开口'],
['在团队任务遇到困难时，你的角色：','主动承担责任并提出方案','配合团队，完成分配任务','焦虑等待，不知如何贡献','退缩回避，减少参与度'],
['描述你近期的整体状态，最接近：','虽有挑战，但方向明确','平稳中有波动，总体可控','忙碌但迷茫，原地打转','被动承受，缺乏动力']
];
var R=[
{n:'放弃刺猬',img:'images/hedgehog.jpg',r:'10 ~ 18',s:'高无助型',
t:'你像一只蜷缩的刺猬，用尖刺筑起防护墙。"如果不尝试就不会失败"是你的潜意识逻辑。',
k:['控制感极低','情绪麻木','提前放弃','外归因'],
v:'刺猬需要安全的环境才能舒展。从最小的安全情境开始，重新建立"行动→好结果"的联结。'},
{n:'躺平龟',img:'images/turtle.jpg',r:'19 ~ 26',s:'回避退缩型',
t:'你像缩进壳里的乌龟，被动等待是主要策略。这不是懒惰，而是心理节能模式。',
k:['心理节能','无奈倦怠','被动等待','低估自己'],
v:'设定最小可行目标：每天进步 1%。寻找同伴支持，区分"真的不行"和"以为不行"。'},
{n:'焦虑仓鼠',img:'images/hamster.jpg',r:'27 ~ 34',s:'忙碌无效型',
t:'你像转轮上的仓鼠，忙碌但原地踏步。越焦虑越忙碌，越忙碌越焦虑。',
k:['方向混乱','精力耗竭','重复无效','过度自责'],
v:'第一步是暂停。从转轮上下来，问自己：这个方向真的对吗？少做，但更聚焦。'},
{n:'探索狐',img:'images/fox.jpg',r:'35 ~ 40',s:'灵活应对型',
t:'你像森林中的狐狸，善于观察、灵活调整。挫折对你来说是学习机会而非终点。',
k:['认知弹性','情绪恢复快','多元策略','成长思维'],
v:'保持灵活的同时学会适时行动，接受"足够好"的方案。将经验系统化，形成可复用策略。'}
];
var ans=[],ci=-1,el=document.getElementById('a');
function gr(sc){if(sc<=18)return R[0];if(sc<=26)return R[1];if(sc<=34)return R[2];return R[3];}

function intro(){el.innerHTML=`<div class="fade flex-1 flex flex-col">
<div class="text-center pt-10 pb-8">
<div class="text-5xl mb-4">\ud83e\udd8a\ud83d\udc22\ud83d\udc39\ud83e\udd94</div>
<h1 class="text-2xl font-bold text-gray-800 mb-1" style="font-family:'Noto Serif SC',serif">挫折动物画像</h1>
<p class="text-sm text-gray-400 tracking-wider">30秒自测 \u00b7 AI生成你的专属画像</p>
</div>
<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 mb-5 text-sm text-gray-600 leading-relaxed">
<p class="mb-3">欢迎使用<b>\u201c挫折动物画像\u201d</b>AI生成器！</p>
<p class="mb-3">在接下来的<b>10道题</b>中，AI将根据你的状态、态度和行动选择，为你生成专属的「挫折动物画像」。</p>
<p>准备好开始这段有趣的自我探索之旅了吗？</p>
</div>
<div class="bg-white/60 rounded-2xl p-4 mb-6 text-xs text-gray-400 leading-relaxed">
<p class="font-medium text-gray-500 mb-2">\u2139\ufe0f 伦理声明</p>
<p>1. 本问卷为教师自编的趣味性心理自评工具，不构成专业心理评估或诊断。</p>
<p>2. 适用于心理健康教育、团体活动或自我探索场景。</p>
<p>3. 结果仅供参考，可能受测试时情绪状态、环境因素等影响。</p>
<p>4. 如有明显困扰或长期无助感，建议寻求专业心理咨询师帮助。</p>
<p>5. 所有测试数据仅用于即时画像生成，不会被保存或分享。</p>
</div>
<button onclick="go()" class="w-full py-4 bg-gray-900 text-white font-medium rounded-xl text-base active:scale-95 transition">我已阅读并理解声明，开始测试 \u2192</button>
</div>`;}

function go(){ans=[];ci=0;qq();}

function qq(){var q=Q[ci],p=Math.round(ci/Q.length*100),lb=['A','B','C','D'],sc=[4,3,2,1];
el.innerHTML=`<div class="fade flex-1 flex flex-col">
<div class="mb-5">
<div class="flex justify-between text-xs text-gray-400 mb-2"><span>${ci+1} / ${Q.length}</span><span>${p}%</span></div>
<div class="h-1 bg-gray-200 rounded-full overflow-hidden"><div class="pb h-full bg-gray-800 rounded-full" style="width:${p}%"></div></div>
</div>
<h2 class="text-lg font-bold text-gray-800 mb-6 leading-relaxed">${q[0]}</h2>
<div class="flex flex-col gap-3 flex-1">
${[1,2,3,4].map(i=>`<button class="ob w-full text-left px-4 py-3.5 bg-white border border-gray-200 rounded-xl text-sm text-gray-700 leading-relaxed" onclick="sel(${sc[i-1]},this)"><span class="inline-block w-6 h-6 rounded-full bg-gray-100 text-center text-xs leading-6 font-medium text-gray-400 mr-2">${lb[i-1]}</span>${q[i]}</button>`).join('')}
</div></div>`;}

function sel(sc,btn){ans.push(sc);document.querySelectorAll('.ob').forEach(b=>{b.classList.add('pointer-events-none','opacity-50');});btn.classList.add('s');btn.classList.remove('opacity-50');setTimeout(()=>{ci++;ci>=Q.length?res():qq();},350);}

function res(){var tot=ans.reduce((a,b)=>a+b,0),r=gr(tot);
el.innerHTML=`<div class="fade flex-1 flex flex-col items-center pt-4">
<div class="card w-full mb-5" id="result-card">
  <div class="card-img-wrap">
    <img src="${r.img}" alt="${r.n}">
  </div>
  <div class="card-body">
    <p class="card-name">${r.n}</p>
    <p class="card-sub">${r.s} \u00b7 ${r.r} 分</p>
    <p class="card-desc">${r.t}</p>
    <div class="card-tags">
      ${r.k.map(x=>`<span>${x}</span>`).join('')}
    </div>
    <div class="card-advice">
      <h4>\u2728 成长建议</h4>
      <p>${r.v}</p>
    </div>
    <div class="card-footer">挫折动物画像 \u00b7 AI自测</div>
  </div>
</div>
<div class="flex gap-3 w-full">
<button onclick="location.reload()" class="flex-1 py-3 bg-white border border-gray-200 text-gray-600 font-medium rounded-xl text-sm active:scale-95 transition">\ud83d\udd04 重新测试</button>
</div>
<p class="text-xs text-gray-400 mt-4 text-center tracking-wide">长按卡片可截图保存</p>
</div>`;}
intro();
</script>
</body>
</html>
